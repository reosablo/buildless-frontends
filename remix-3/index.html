<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buildless Remix 3 app</title>
    <link rel="stylesheet" href="https://esm.sh/*simpledotcss@2.3.7" />
    <script type="importmap">
      {
        "imports": {
          "@remix-run/ui": "https://esm.sh/*@remix-run/ui@0.1.1?dev",
          "@remix-run/ui/": "https://esm.sh/*@remix-run/ui@0.1.1&dev/",
          "remix/": "https://esm.sh/*remix@3.0.0-beta.0&dev/"
        }
      }
    </script>
    <script type="module">
      import {
        availablePresets,
        registerPreset,
      } from "https://esm.sh/@babel/standalone@7.28.1";

      registerPreset("jsx", {
        presets: [[availablePresets["react"], { runtime: "automatic" }]],
      });
    </script>
    <!-- `data-plugins=""` attribute is required for @babel/standalone@7.28.1 -->
    <script
      type="text/babel"
      data-presets="jsx,typescript"
      data-plugins=""
      data-type="module"
      src="./main.tsx"
    ></script>
  </head>
  <body></body>
</html>
